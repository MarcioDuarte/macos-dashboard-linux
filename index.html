  /* Reset */
* {
    box-sizing: border-box;
    margin: 0; 
    padding: 0;

}

body {

/* O Grid Principal Refatorado */
.dashboard {
	margin-top: 2vh;
	display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
    position: fixed;
    top: 30px;
    right: 30px;
    align-items: flex-end;
	height: 1080px;
	flex-wrap: wrap;
}

/* A ÂNCORA e o ENVELOPADOR (Arquitetura Universal) */
.weather-widget, .clock-widget, .calendar-widget, .system-widget {
    position: relative;
}

.widget-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
	
}


/* -------------------------------------
   2. WIDGET: RELÓGIO
------------------------------------- */
.clock-widget {
    background: #2c2c2e;
    border-radius: 24px;
    padding: 25px;

    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    width: 330px;
    margin: 0 !important;
    min-height: 158px;
	height: 158px
}

.time-container {
    display: flex;
    align-items: baseline;
    justify-content: center;
    margin-top: -6%;
}

.main-time {
    font-size: 5.5rem;
    letter-spacing: -2px;
    color: white;
    font-family: "Fjalla One", sans-serif;
}

.seconds {
    font-size: 3.3rem;
    margin-left: 2px;
    color: white;
    font-family: "Fjalla One", sans-serif;
}

.info-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid #878787;
    padding-top: 10px;
    color: white;
}

.location-name {
    font-size: 0.9rem;
    text-align: right;
    color: white;
    width: 100%;
    margin-right: 20px;
	font-weight: 700;
}

.timezone {
    font-size: 0.9rem;
    margin: 0;
    color: white;
	width: 100%;
}

/* -------------------------------------
   3. WIDGET: CALENDÁRIO
------------------------------------- */
.calendar-widget {
    background-color: #1c1c1e;
    color: white;

    font-family: -apple-system, sans-serif;

    height: 200px;
}

.date-highlight {

    justify-content: center;

.blue-text { 
    color: #ff3b30 !important; 
    text-transform: uppercase; 
    font-size: 1.4rem; 
    margin: 0; 
    font-weight: 500; 
    text-align: center; 
}

#month-name { 
    font-size: 1.2rem; 
    margin: 10px 0 5px 0; 
    font-weight: 500; 
    text-align: center; 
}

#day-number {

    margin: 0; 
    font-weight: 500; 
    text-align: center; 
}

.month-grid {
    flex: 1.2;
    padding-left: 21px;
    margin-top: -2px;
}

.days-header, .days-numbers {

    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    gap: 0px 5px;
}

.days-header {
    color: #555;

}

.days-numbers {

    width: 28px;

.current-day {
    background-color: #007aff !important;

}

        const date = new Date((timestamp + timezoneOffsetSeconds) * 1000);
        return new Intl.DateTimeFormat('pt-BR', {
            hour: 'numeric', hour12: false, timeZone: 'UTC'
        }).format(date) + "h";

        const date = new Date((timestamp + timezoneOffsetSeconds) * 1000);
        return new Intl.DateTimeFormat('pt-BR', { weekday: 'short', timeZone: 'UTC' }).format(date).charAt(0).toUpperCase() + new Intl.DateTimeFormat('pt-BR', { weekday: 'short', timeZone: 'UTC' }).format(date).slice(1).replace(".", "");
    }

    async function fetchWeather() {
        // 2. INFRAESTRUTURA: Fallback rígido para Curitiba caso a geolocalização do Electron falhe
        const lat = -25.375659;
        const lon = -49.254046;

        try {
            // CORREÇÃO CRÍTICA: Removemos o 'daily' do exclude para receber a previsão semanal
            const url = `https://api.openweathermap.org/data/3.0/onecall?lat=${lat}&lon=${lon}&units=metric&lang=pt_br&exclude=minutely,alerts&appid=${apiKey}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error("Erro HTTP: " + res.status);
            const data = await res.json();

            // Busca nome da cidade
            const geoUrl = `https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&lang=pt_br&limit=1&appid=${apiKey}`;
            const geoRes = await fetch(geoUrl);

            document.getElementById("aw-city").textContent = city;

            document.getElementById("aw-desc").textContent = data.current.weather[0].description.charAt(0).toUpperCase() + data.current.weather[0].description.slice(1);
            document.getElementById("aw-hl").textContent = `H:${Math.round(data.daily[0].temp.max)}° L:${Math.round(data.daily[0].temp.min)}°`;

            // Troca a tag de imagem por um elemento de texto para suportar seus emojis

const mainIconName = iconMap[data.current.weather[0].icon] || "nublado.png";
const mainIconContainer = document.getElementById("aw-icon-main");

// Mantendo a estrutura, mas injetando a imagem
mainIconContainer.innerHTML = `<img src="${iconPath}${mainIconName}" style="width: 32px; height: 32px; object-fit: contain;">`;

            
            // 4. PREVISÃO HORÁRIA (Hourly)
            const sunrise = data.current.sunrise;
const sunset = data.current.sunset;
const timezoneOffset = data.timezone_offset;

// 4. PREVISÃO HORÁRIA (Hourly)
let hourlyData = data.hourly.slice(0, 12); // Aumentei para 12h para garantir que pegamos o evento

// ALGORITMO DE INSERÇÃO: Criamos objetos falsos de "hora" para o sol
const sunEvents = [];
if (sunrise > hourlyData[0].dt && sunrise < hourlyData[hourlyData.length - 1].dt) {
    sunEvents.push({ dt: sunrise, isSunEvent: true, type: 'sunrise', label: 'Nascer do Sol' });
}
if (sunset > hourlyData[0].dt && sunset < hourlyData[hourlyData.length - 1].dt) {
    sunEvents.push({ dt: sunset, isSunEvent: true, type: 'sunset', label: 'Pôr do Sol' });
}

  function updateClock() {
        const now = new Date();
        
        // 1. Atualiza Horas e Minutos
        const hm = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('hours-mins').textContent = hm;
        
        // 2. Atualiza Segundos
        const s = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('seconds').textContent = `:` + s;

        // 3. Calcula e exibe o GMT Local (Racional e Automático)
        const offset = now.getTimezoneOffset(); // Retorna em minutos (ex: 180 para -3h)
        const absOffset = Math.abs(offset);
        const hours = Math.floor(absOffset / 60);
        const minutes = absOffset % 60;
        const sign = offset <= 0 ? "+" : "-";
        
        const gmtString = `${sign}${hours}:${minutes.toString().padStart(2, '0')}`;
        document.getElementById('gmt-display').textContent = gmtString;
    }

    // Executa a cada segundo para precisão total
    setInterval(updateClock, 1000);
    updateClock(); // Chamada inicial imediata
	
	

async function generateMacCalendar() {
    const now = new Date();
    const month = now.getMonth();
    const year = now.getFullYear();
    const today = now.getDate();

    const dayNames = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
    const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
    
    document.getElementById('mc-day-name').textContent = dayNames[now.getDay()];
    document.getElementById('mc-day-number').textContent = today;
    document.getElementById('mc-month-name').textContent = monthNames[month];

    const todayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(today).padStart(2, '0')}`;
    const eventsContainer = document.querySelector('.mc-events-text');

    try {
        // 1. Solicita ao main.js a pasta de configuração do Linux (~/.config/seu-app)
        const userDataPath = await ipcRenderer.invoke('get-user-path');
        
        // 2. Monta o caminho absoluto blindado
        const eventsPath = path.join(userDataPath, 'events.json');
        
        // 3. Auto-Cura: Se o arquivo não existir (primeira vez rodando), cria a estrutura vazia
        if (!fs.existsSync(eventsPath)) {
            fs.writeFileSync(eventsPath, JSON.stringify([]), 'utf8');
        }

        // 4. Lê o arquivo da pasta segura
        const eventsData = await fs.promises.readFile(eventsPath, 'utf8');
        const events = JSON.parse(eventsData); 

        const todayEvents = events.filter(e => e.date === todayStr);

        if (todayEvents.length > 0) {
            eventsContainer.innerHTML = todayEvents.map(e => `• ${e.title}`).join('<br>');
            eventsContainer.style.color = '#ffffff'; 
        } else {
            eventsContainer.textContent = "No events today";
            eventsContainer.style.color = '#98989d';
        }
        
    } catch (err) {
        console.error("Falha na esteira de eventos:", err);
        eventsContainer.textContent = "Erro na leitura de eventos";
        eventsContainer.style.color = '#ff453a'; 
    }

    // Cálculos da Grade do Calendário mantidos intactos...
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('mc-calendar-days');
    
    grid.innerHTML = "";

    for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += `<span></span>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const isToday = d === today ? 'mc-current-day' : '';
        grid.innerHTML += `<span class="${isToday}">${d}</span>`;
    }
}

generateMacCalendar();
setInterval(generateMacCalendar, 3600000);
	
	





function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

async function updateEulWidget() {
    try {
        const [cpu, temp, mem, battery, netInt, procs] = await Promise.all([
            si.currentLoad(),
            si.cpuTemperature(),
            si.mem(),
            si.battery(),
            si.networkInterfaces(),
            si.processes()
        ]);

        // --- CPU ---
        const cpuTotal = cpu.currentLoad.toFixed(1);
        document.getElementById('eul-cpu-total').textContent = `${cpuTotal}%`;
        document.getElementById('eul-cpu-bar').style.width = `${cpuTotal}%`;
        document.getElementById('eul-cpu-sys').textContent = `${cpu.currentLoadSystem.toFixed(1)}%`;
        document.getElementById('eul-cpu-user').textContent = `${cpu.currentLoadUser.toFixed(1)}%`;
        document.getElementById('eul-cpu-cores').textContent = cpu.cpus.length;
        document.getElementById('eul-cpu-temp').textContent = temp.main ? `${Math.round(temp.main)}°C` : 'N/A';

        // Processos da CPU
        const topProcs = procs.list.sort((a, b) => b.cpu - a.cpu).slice(0, 5);
        document.getElementById('eul-cpu-procs').innerHTML = topProcs.map(p => `
            <li class="eul-proc-item">
                <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;">${p.name}</span>
                <span style="color: white; font-weight: 500;">${p.cpu.toFixed(1)}</span>
            </li>
        `).join('');

        // --- MEMORY ---
        const totalGb = (mem.total / 1e9).toFixed(2);
        const usedGb = (mem.active / 1e9).toFixed(2);
        const freeGb = (mem.available / 1e9).toFixed(2);
        
        document.getElementById('eul-mem-total').textContent = `${totalGb} GB`;
        document.getElementById('eul-mem-used').textContent = `${usedGb} GB`;
        document.getElementById('eul-mem-free').textContent = `${freeGb} GB`;
        document.getElementById('eul-mem-bar').style.width = `${(mem.active / mem.total) * 100}%`;
        
        // Tradução da semântica Linux
        document.getElementById('eul-mem-cache').textContent = `${(mem.buffcache / 1e9).toFixed(2)} GB`;
        document.getElementById('eul-mem-active').textContent = `${(mem.active / 1e9).toFixed(2)} GB`;
        document.getElementById('eul-mem-swap').textContent = `${(mem.swapused / 1e9).toFixed(2)} GB`;

        // --- BATTERY ---
        if (battery.hasBattery) {
            document.getElementById('eul-bat-percent').textContent = `${battery.percent}%`;
            document.getElementById('eul-bat-health').textContent = battery.health ? `${battery.health}%` : 'N/A';
            document.getElementById('eul-bat-max').textContent = battery.maxcapacity ? `${battery.maxcapacity} mAh` : 'N/A';
            document.getElementById('eul-bat-cycles').textContent = battery.cyclecount || '0';
        } else {
            document.getElementById('eul-bat-percent').textContent = 'N/A (Desktop)';
        }

        // --- NETWORK ---
        // Pega a interface principal para ler a taxa de transferência
        const defaultNet = await si.networkInterfaceDefault();
        const netStats = await si.networkStats(defaultNet);
        if (netStats && netStats.length > 0) {
            document.getElementById('eul-net-out').textContent = `${formatBytes(netStats[0].tx_sec)}/s`;
            document.getElementById('eul-net-in').textContent = `${formatBytes(netStats[0].rx_sec)}/s`;
        }

    } catch (err) {
        console.error("Erro na esteira Eul:", err);
    }
}

updateEulWidget();
setInterval(updateEulWidget, 2000);
